spring.config.import=optional:file:.env[.properties]

spring.application.name=${APP_NAME:backend_template}
server.port=${SERVER_PORT:8080}

# Template-level environment marker for runtime profiles and logging.
app.environment=${APP_ENV:local}

# Optional JWT settings for future auth module integration.
# Keep empty by default in template repos; set in .env when auth is enabled.
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
