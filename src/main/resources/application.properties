spring.config.import=optional:file:.env[.properties]

spring.application.name=${APP_NAME:hotel_management}
server.port=${SERVER_PORT:8080}

# Template-level environment marker for runtime profiles and logging.
app.environment=${APP_ENV:local}


# Optional JWT settings for future auth module integration.
# Keep empty by default in template repos; set in .env when auth is enabled.
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Database configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Jefino@1537}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA + schema initialization
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
